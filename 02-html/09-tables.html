<!DOCTYPE html>
<html lang="en">
<head>

    <title>09-Tables</title>
    <link rel="stylesheet" href="../src/css/master.css">
    <style>
        table{
            border-collapse: collapse;
            width: 100%;
            thead{
                background-color: #0000008a;
                padding: 0.4rem;
                color: #fff;
            }
        }
        tbody{
            tr{
                &:first-of-type{
                    border-top: 1px solid #fff;
                    color: #fff;
                }
                &:nth-child{
                    background-color: rgba(66,64,64,0.445);
                }
            }
            td{
                border-bottom: 1px solid #fff;
                font-size: 0.8rem;
                padding: 0.4rem;
                text-align: center;
                color: #fff;
            }
        }
        tfoot {
            background-color: #0000008a;
            padding: 0.4rem 0.6rem;
            font-size: 0.8rem;
            text-align: center;
            color: #fff;
        }
        
    </style>
</head>
